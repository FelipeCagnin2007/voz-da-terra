<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voz da Terra - Artigo</title>
  <link rel="icon" type="image/png" href="../logo.png" />
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <div id="sidebar-placeholder"></div>

    <main class="content">
      <header class="main-header">
        <a href="../index.html" class="back-link">← Voltar para o início</a>
      </header>

      <section class="reading-container" id="article-loader">
        <p>Carregando conteúdo do banco de dados...</p>
      </section>

      <section
        class="reading-container"
        id="article-view"
        style="display: none"
      >
        <article class="article-card full-article">
          <img
            src=""
            class="article-image-full"
            id="art-image"
            alt="Imagem de Capa do Artigo"
          />
          <div class="article-body">
            <span class="category-tag" id="art-category">Ecossistema</span>
            <h1 id="art-title">Título do Artigo</h1>
            <div class="article-meta">
              <span
                >Por <strong id="art-author">Equipe Voz da Terra</strong></span
              >
              •
              <span id="art-date">Março, 2026</span>
            </div>
            <div class="article-content" id="art-content"></div>
          </div>
        </article>
      </section>
    </main>

    <script src="../components.js"></script>
    <script src="../script.js"></script>
    <script>
      const formatDate = (dateStr) => {
        if (!dateStr || dateStr === "Data não informada") return dateStr;
        
        let date = new Date(dateStr);
        
        // Se a conversão direta falhar, tenta tratar DD/MM/YYYY
        if (isNaN(date.getTime())) {
          let parts = dateStr.split(/[\/\-]/);
          if (parts.length === 3) {
            if (parts[0].length === 4) date = new Date(parts[0], parts[1]-1, parts[2]);
            else date = new Date(parts[2], parts[1]-1, parts[0]);
          }
        }

        if (isNaN(date.getTime())) return dateStr;

        const d = String(date.getDate()).padStart(2, '0');
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const y = date.getFullYear();

        return `Publicado em ${d}/${m}/${y}`;
      };

      async function loadFullArticle() {
        const urlParams = new URLSearchParams(window.location.search);
        const typeParam = urlParams.get("type") || "";
        const isProject = typeParam.toLowerCase().includes("projeto");
        const type = isProject ? "projetos" : "artigos";
        
        const articleId = sessionStorage.getItem("vozDaTerra_active_content_id");
        const navigationOrigin = sessionStorage.getItem("vozDaTerra_navigation_origin");

        // Atualiza o link de volta baseado na ORIGEM (sessionStorage)
        const backLink = document.querySelector(".back-link");
        if (backLink) {
          if (navigationOrigin === "projects") {
            backLink.href = "projetos.html";
            backLink.textContent = "← Voltar para Projetos";
          } else {
            backLink.href = "../index.html";
            backLink.textContent = "← Voltar para o início";
          }
        }

        if (!articleId) {
          document.getElementById("article-loader").innerHTML =
            `<h2>Erro: Nenhum conteúdo selecionado.</h2><p>Redirecionando...</p>`;
          setTimeout(() => {
            window.location.href = "../index.html";
          }, 2500);
          return;
        }

        try {
          let items = await DataService.request({ table: type });
          
          if (!Array.isArray(items)) {
            throw new Error(`Dados inválidos recebidos da API para: ${type}`);
          }

          let item = items.find((a) => {
            const currentId = String(a.id || a.Id || a.ID || a.index || "").trim();
            const targetId = String(articleId || "").trim();
            return currentId === targetId && targetId !== "";
          });

          // FALLBACK: Se não achar na tabela sugerida, tenta na outra
          if (!item) {
            const otherType = type === "projetos" ? "artigos" : "projetos";
            const otherItems = await DataService.request({ table: otherType });
            if (Array.isArray(otherItems)) {
              item = otherItems.find((a) => {
                const currentId = String(a.id || a.Id || a.ID || a.index || "").trim();
                const targetId = String(articleId || "").trim();
                return currentId === targetId;
              });
            }
          }

          if (!item) {
            document.getElementById("article-loader").innerHTML =
              `<h2>Conteúdo não localizado (ID: ${articleId}).</h2>
               <p>Verifique se o item ainda existe na planilha.</p>
               <a href="../index.html" class="read-more">Voltar para Início</a>`;
            return;
          }

          // Extração das propriedades da API
          const titulo = item.titulo || item.Título || "Sem título";
          const conteudoRaw = item.conteudo || item.Conteúdo || "";
          const autor = item.autor || item.Autor || "Equipe Voz da Terra";
          const emailAutor =
            item.email_autor || item.emailAutor || item.Email || "";
          const dataPublicacao =
            item.data || item.Data || "Data não informada";

          // Captura da Imagem
          const fallbackImg =
            "https://images.unsplash.com/photo-1473448912268-2022ce9509d8?auto=format&fit=crop&w=1200&q=80";
          const urlImagem =
            item.imagem || item.url_imagem || item.Imagem || fallbackImg;

          // Data Binding no DOM
          document.getElementById("art-image").src = urlImagem;
          document.getElementById("art-title").textContent = titulo;
          const tagEl = document.getElementById("art-category");
          if (tagEl) {
            tagEl.textContent = item.tag || (type === "projetos" ? "Iniciativa" : "Ecossistema");
          }
          document.getElementById("art-date").textContent = formatDate(dataPublicacao);

          const authorNode = document.getElementById("art-author");
          if (emailAutor && String(emailAutor).trim() !== "") {
            authorNode.innerHTML = `<a href="mailto:${emailAutor}" style="color: inherit; text-decoration: underline;">${autor}</a>`;
          } else {
            authorNode.textContent = autor;
          }

          document.getElementById("art-content").innerHTML = String(conteudoRaw)
            .split("\n")
            .filter((text) => text.trim() !== "")
            .map((p) => `<p>${p}</p>`)
            .join("");

          document.getElementById("article-loader").style.display = "none";
          document.getElementById("article-view").style.display = "block";
        } catch (error) {
          console.error("Erro técnico na leitura do banco:", error);
          document.getElementById("article-loader").innerHTML =
            "<p>Erro na conexão com os dados.</p>";
        }
      }

      window.addEventListener("load", loadFullArticle);
    </script>
  </body>
</html>
