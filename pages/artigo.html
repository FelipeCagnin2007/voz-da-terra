<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voz da Terra - Artigo</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <aside class="sidebar">
      <div class="sidebar-top">
        <div class="logo">
          <img src="../logo.png" alt="logo" />
          <div>VOZ DA<br />TERRA</div>
        </div>
        <button class="hamburger" id="btn-menu">
          <span></span><span></span><span></span>
        </button>
        <nav class="nav-menu" id="nav-menu">
          <ul>
            <li><a href="../index.html">Página Inicial</a></li>
            <li><a href="dados.html">Pesquisa e Dados</a></li>
            <li><a href="projetos.html">Projetos Ecológicos</a></li>
            <li><a href="#">Baixar APP</a></li>
          </ul>
        </nav>
      </div>
    </aside>

    <main class="content">
      <header class="main-header">
        <a href="../index.html" class="back-link">← Voltar para o início</a>
      </header>

      <section class="reading-container" id="article-loader">
        <p>Carregando conteúdo do banco de dados...</p>
      </section>

      <section
        class="reading-container"
        id="article-view"
        style="display: none"
      >
        <article class="article-card full-article">
          <img
            src=""
            class="article-image-full"
            id="art-image"
            alt="Imagem de Capa do Artigo"
          />
          <div class="article-body">
            <span class="category-tag" id="art-category">Ecossistema</span>
            <h1 id="art-title">Título do Artigo</h1>
            <div class="article-meta">
              <span
                >Por <strong id="art-author">Equipe Voz da Terra</strong></span
              >
              •
              <span id="art-date">Março, 2026</span>
            </div>
            <div class="article-content" id="art-content"></div>
          </div>
        </article>
      </section>
    </main>

    <script src="../script.js"></script>
    <script>
      async function loadFullArticle() {
        const articleId = sessionStorage.getItem("vozDaTerra_currentArticleId");

        if (!articleId) {
          document.getElementById("article-loader").innerHTML =
            "<h2>Erro: Nenhum artigo foi selecionado.</h2><p>Redirecionando para a página inicial...</p>";
          setTimeout(() => {
            window.location.href = "../index.html";
          }, 2500);
          return;
        }

        try {
          const artigos = await DataService.request({ table: "artigos" });

          const artigo = artigos.find((a) => {
            const currentId = a.id || a.Id || a.ID || a.index;
            return String(currentId) === String(articleId);
          });

          if (!artigo) {
            document.getElementById("article-loader").innerHTML =
              "<h2>Artigo não localizado na base de dados.</h2>";
            return;
          }

          // Extração das propriedades da API
          const titulo = artigo.titulo || artigo.Título || "Sem título";
          const conteudoRaw = artigo.conteudo || artigo.Conteúdo || "";
          const autor = artigo.autor || artigo.Autor || "Equipe Voz da Terra";
          const emailAutor =
            artigo.email_autor || artigo.emailAutor || artigo.Email || "";
          const dataPublicacao =
            artigo.data || artigo.Data || "Data não informada";

          // Captura da Imagem
          const fallbackImg =
            "https://images.unsplash.com/photo-1473448912268-2022ce9509d8?auto=format&fit=crop&w=1200&q=80";
          const urlImagem =
            artigo.imagem || artigo.url_imagem || artigo.Imagem || fallbackImg;

          // Data Binding no DOM
          document.getElementById("art-image").src = urlImagem;
          document.getElementById("art-title").textContent = titulo;
          document.getElementById("art-date").textContent = dataPublicacao;

          const authorNode = document.getElementById("art-author");
          if (emailAutor && String(emailAutor).trim() !== "") {
            authorNode.innerHTML = `<a href="mailto:${emailAutor}" style="color: inherit; text-decoration: underline;">${autor}</a>`;
          } else {
            authorNode.textContent = autor;
          }

          document.getElementById("art-content").innerHTML = String(conteudoRaw)
            .split("\n")
            .filter((text) => text.trim() !== "")
            .map((p) => `<p>${p}</p>`)
            .join("");

          document.getElementById("article-loader").style.display = "none";
          document.getElementById("article-view").style.display = "block";
        } catch (error) {
          console.error("Erro técnico na leitura do banco:", error);
          document.getElementById("article-loader").innerHTML =
            "<p>Erro na conexão com os dados.</p>";
        }
      }

      window.addEventListener("load", loadFullArticle);
    </script>
  </body>
</html>
