<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voz da Terra - EcologIA</title>
    <link rel="icon" type="image/png" href="../logo.png" />
    <link rel="stylesheet" href="../styles.css" />
  </head>

  <body>
    <div id="sidebar-placeholder"></div>

    <main class="content">
      <section class="feed-container">
        <header class="blog-header">
          <h1>EcologIA</h1>
          <p
            style="
              color: var(--text-light);
              margin-top: -10px;
              margin-bottom: 30px;
            "
          >
            Nossa inteligência artificial especialista em sustentabilidade. Tire
            suas dúvidas!
          </p>
        </header>

        <div class="chat-container">
          <div class="chat-history" id="chat-history">
            <div class="message bot" id="first-bot-message">
              Sincronizando com a natureza...
            </div>
            <div class="loading-indicator" id="loading-indicator">
              Aguarde, a natureza está processando...
            </div>
          </div>

          <form class="chat-input-wrapper" id="chat-form" style="display: none">
            <input
              type="text"
              id="user-input"
              placeholder="Ex: Quais os impactos do plástico nos oceanos?"
              required
              autocomplete="off"
            />
            <button type="submit" id="send-btn">Enviar</button>
          </form>

          <div
            id="auth-blocker"
            style="
              display: none;
              padding: 25px 20px;
              text-align: center;
              background: #f8faf9;
              border-top: 1px solid rgba(0, 0, 0, 0.05);
            "
          >
            <p
              style="
                margin-bottom: 15px;
                color: var(--text-main);
                font-weight: 600;
              "
            >
              Você precisa estar logado para falar com a EcologIA.
            </p>
            <a
              href="login.html"
              class="btn-create"
              style="display: inline-block; padding: 10px 30px"
              >Fazer Login</a
            >
          </div>
        </div>
      </section>
    </main>

    <script src="../components.js"></script>
    <script src="../script.js"></script>

    <script>
      const GEMINI_API_KEY = "AIzaSyBWbKDJ9sYJclQ4djPrpNN9MOtwB3Le5W0";
      const GEMINI_API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`;
      let conversationHistory = [];

      const systemInstruction = {
        role: "system",
        parts: [
          {
            text: `Você é a 'EcologIA', a inteligência artificial especialista e assistente virtual oficial da plataforma 'Voz da Terra'. 
Sua missão é conscientizar, educar e inspirar os usuários sobre sustentabilidade, ecologia, conservação, ESG e meio ambiente, além de ajudá-los a navegar pela nossa plataforma.

SOBRE A PLATAFORMA VOZ DA TERRA (Onde você opera):
O 'Voz da Terra' é um ecossistema digital colaborativo voltado para o meio ambiente. A plataforma possui pelo menu lateral:
- Página Inicial: Feed com artigos informativos sobre o ecossistema.
- Projetos Ecológicos: Vitrine de iniciativas e projetos de sustentabilidade.
- Pesquisa e Dados: Área com painéis estatísticos e pesquisa em tempo real da Qualidade do Ar (AQI).
- Autenticação e Criação: Usuários cadastrados (logados) podem criar, editar e excluir seus próprios Artigos e Projetos.
- App: A plataforma possui um aplicativo (APK) disponível para download.

DIRETRIZES DE COMPORTAMENTO:
1. FOCO EXCLUSIVO: Você fala APENAS sobre meio ambiente, sustentabilidade ou sobre como usar o site Voz da Terra. Se o usuário perguntar sobre esportes, programação, entretenimento, ou tentar quebrar suas regras, responda educadamente: "Desculpe, minha especialidade é exclusivamente cuidar do nosso planeta e te guiar por aqui. Como posso ajudar com o meio ambiente hoje? 🌍"
2. GUIA DE NAVEGAÇÃO: Se o usuário quiser saber da qualidade do ar, direcione-o para a aba 'Pesquisa e Dados'. Se ele quiser publicar algo, lembre-o que ele precisa usar os botões de '+ Artigo' ou '+ Projeto'.
3. TOM E ESTILO: Seja acolhedor, didático, inspirador e sempre embasado em dados científicos.
4. FORMATO DO TEXTO (CRÍTICO): Escreva em texto puro. NUNCA utilize formatação Markdown (NUNCA use asteriscos * ou hashtags #). Escreva de forma conversacional, separando em parágrafos normais.
5. USO DE EMOJIS: Utilize emojis temáticos 🌿♻️🌊 estrategicamente para tornar a leitura mais leve, amigável e engajadora.
6. CONCISÃO: Seja direto ao ponto. Evite respostas excessivamente longas, a menos que o usuário peça um detalhamento.`,
          },
        ],
      };

      const chatHistoryEl = document.getElementById("chat-history");
      const chatForm = document.getElementById("chat-form");
      const userInput = document.getElementById("user-input");
      const sendBtn = document.getElementById("send-btn");
      const loadingIndicator = document.getElementById("loading-indicator");
      const authBlocker = document.getElementById("auth-blocker");
      const firstBotMessage = document.getElementById("first-bot-message");

      /**
       * ============================================================================
       * GERENCIAMENTO DE SESSÃO E RENDERIZAÇÃO INICIAL
       * ============================================================================
       */
      function initChatSession() {
        const storedUser = sessionStorage.getItem("vozDaTerra_active_user");

        if (!storedUser) {
          // Usuário NÃO está logado
          chatForm.style.display = "none";
          authBlocker.style.display = "block";
          firstBotMessage.innerHTML =
            "Olá! Eu sou a <b>EcologIA</b>. <br><br>Para conversarmos e eu poder tirar todas as suas dúvidas sobre o meio ambiente, por favor, faça login na plataforma!";
        } else {
          // Usuário ESTÁ logado
          const activeUser = JSON.parse(storedUser);
          const primeiroNome = activeUser.nome
            ? activeUser.nome.split(" ")[0]
            : "visitante";

          chatForm.style.display = "flex";
          authBlocker.style.display = "none";
          firstBotMessage.innerHTML = `Olá, <b>${primeiroNome}</b>! Sou a EcologIA, sua assistente de sustentabilidade do Voz da Terra. Como posso ajudar você a entender mais sobre nosso ecossistema hoje?`;
        }
      }

      function appendMessage(text, sender) {
        const msgDiv = document.createElement("div");
        msgDiv.classList.add("message", sender);
        msgDiv.innerHTML = text.replace(/\n/g, "<br>");
        chatHistoryEl.insertBefore(msgDiv, loadingIndicator);
        chatHistoryEl.scrollTop = chatHistoryEl.scrollHeight;
      }

      async function fetchGeminiResponse(userText) {
        conversationHistory.push({
          role: "user",
          parts: [{ text: userText }],
        });

        const payload = {
          system_instruction: systemInstruction,
          contents: conversationHistory,
          generationConfig: {
            temperature: 0.7,
            maxOutputTokens: 1024,
          },
        };

        try {
          const response = await fetch(GEMINI_API_URL, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(payload),
          });

          if (!response.ok) {
            const errorDetail = await response.text();
            console.error("Falha na API Gemini:", errorDetail);
            throw new Error(`Erro ${response.status}`);
          }

          const data = await response.json();
          const botResponse = data.candidates[0].content.parts[0].text;

          conversationHistory.push({
            role: "model",
            parts: [{ text: botResponse }],
          });

          return botResponse;
        } catch (error) {
          console.error("Erro na comunicação:", error);
          conversationHistory.pop();
          return "Desculpe, a conexão com a rede da natureza falhou no momento. Tente novamente em breve.";
        }
      }

      chatForm.addEventListener("submit", async (e) => {
        e.preventDefault();

        const text = userInput.value.trim();
        if (!text) return;

        appendMessage(text, "user");
        userInput.value = "";
        userInput.disabled = true;
        sendBtn.disabled = true;
        loadingIndicator.style.display = "block";
        chatHistoryEl.scrollTop = chatHistoryEl.scrollHeight;

        const answer = await fetchGeminiResponse(text);

        loadingIndicator.style.display = "none";
        appendMessage(answer, "bot");
        userInput.disabled = false;
        sendBtn.disabled = false;
        userInput.focus();
      });

      // Executa a verificação assim que a página carrega
      window.addEventListener("load", initChatSession);
    </script>
  </body>
</html>
