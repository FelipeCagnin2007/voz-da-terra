<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voz da Terra - Acesso</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <div id="sidebar-placeholder"></div>

    <main
      class="content"
      style="
        display: flex;
        justify-content: center;
        align-items: center;
        padding-top: 50px;
      "
    >
      <section
        class="article-card"
        style="width: 100%; max-width: 450px; padding: 40px; margin: 0"
      >
        <div id="view-login">
          <h2
            style="
              color: var(--dark-green);
              font-weight: 900;
              margin-bottom: 25px;
              text-align: center;
              font-size: 2rem;
            "
          >
            Acessar Conta
          </h2>

          <form id="form-login">
            <div style="margin-bottom: 20px">
              <label
                style="
                  display: block;
                  margin-bottom: 8px;
                  font-weight: 600;
                  color: var(--text-main);
                  font-size: 0.9rem;
                "
                >E-mail</label
              >
              <input
                type="email"
                id="login-email"
                required
                placeholder="seu@email.com"
                style="
                  width: 100%;
                  padding: 14px;
                  border: 1px solid rgba(0, 0, 0, 0.1);
                  border-radius: var(--border-radius-md);
                  font-family: inherit;
                  font-size: 1rem;
                  outline: none;
                  transition: var(--transition);
                "
                onfocus="this.style.borderColor='var(--accent-green)'"
                onblur="this.style.borderColor='rgba(0,0,0,0.1)'"
              />
            </div>

            <div style="margin-bottom: 25px">
              <label
                style="
                  display: block;
                  margin-bottom: 8px;
                  font-weight: 600;
                  color: var(--text-main);
                  font-size: 0.9rem;
                "
                >Senha</label
              >
              <input
                type="password"
                id="login-senha"
                required
                placeholder="••••••••"
                style="
                  width: 100%;
                  padding: 14px;
                  border: 1px solid rgba(0, 0, 0, 0.1);
                  border-radius: var(--border-radius-md);
                  font-family: inherit;
                  font-size: 1rem;
                  outline: none;
                  transition: var(--transition);
                "
                onfocus="this.style.borderColor='var(--accent-green)'"
                onblur="this.style.borderColor='rgba(0,0,0,0.1)'"
              />
            </div>

            <p
              id="error-login"
              style="
                color: #e74c3c;
                font-size: 0.85rem;
                font-weight: 600;
                margin-bottom: 15px;
                text-align: center;
                display: none;
              "
            ></p>

            <button
              type="submit"
              id="btn-submit-login"
              style="
                width: 100%;
                padding: 16px;
                background: var(--dark-green);
                color: var(--white);
                border: none;
                border-radius: var(--border-radius-md);
                font-weight: 800;
                font-size: 1rem;
                cursor: pointer;
                transition: var(--transition);
              "
            >
              Entrar
            </button>
          </form>

          <p
            style="
              text-align: center;
              margin-top: 25px;
              font-size: 0.95rem;
              color: var(--text-light);
            "
          >
            Ainda não tem conta?
            <a
              href="#"
              id="link-to-register"
              style="color: var(--accent-green); font-weight: 800"
              >Cadastre-se</a
            >
          </p>
        </div>

        <div id="view-register" style="display: none">
          <h2
            style="
              color: var(--dark-green);
              font-weight: 900;
              margin-bottom: 25px;
              text-align: center;
              font-size: 2rem;
            "
          >
            Criar Conta
          </h2>

          <form id="form-register">
            <div style="margin-bottom: 15px">
              <label
                style="
                  display: block;
                  margin-bottom: 8px;
                  font-weight: 600;
                  font-size: 0.9rem;
                "
                >Nome Completo</label
              >
              <input
                type="text"
                id="reg-nome"
                required
                placeholder="Ex: Maria Silva"
                style="
                  width: 100%;
                  padding: 14px;
                  border: 1px solid rgba(0, 0, 0, 0.1);
                  border-radius: var(--border-radius-md);
                  font-family: inherit;
                  font-size: 1rem;
                  outline: none;
                "
              />
            </div>

            <div style="margin-bottom: 15px">
              <label
                style="
                  display: block;
                  margin-bottom: 8px;
                  font-weight: 600;
                  font-size: 0.9rem;
                "
                >E-mail</label
              >
              <input
                type="email"
                id="reg-email"
                required
                placeholder="seu@email.com"
                style="
                  width: 100%;
                  padding: 14px;
                  border: 1px solid rgba(0, 0, 0, 0.1);
                  border-radius: var(--border-radius-md);
                  font-family: inherit;
                  font-size: 1rem;
                  outline: none;
                "
              />
            </div>

            <div style="margin-bottom: 25px">
              <label
                style="
                  display: block;
                  margin-bottom: 8px;
                  font-weight: 600;
                  font-size: 0.9rem;
                "
                >Senha</label
              >
              <input
                type="password"
                id="reg-senha"
                required
                minlength="6"
                placeholder="Mínimo 6 caracteres"
                style="
                  width: 100%;
                  padding: 14px;
                  border: 1px solid rgba(0, 0, 0, 0.1);
                  border-radius: var(--border-radius-md);
                  font-family: inherit;
                  font-size: 1rem;
                  outline: none;
                "
              />
            </div>

            <p
              id="error-register"
              style="
                color: #e74c3c;
                font-size: 0.85rem;
                font-weight: 600;
                margin-bottom: 15px;
                text-align: center;
                display: none;
              "
            ></p>

            <button
              type="submit"
              id="btn-submit-register"
              style="
                width: 100%;
                padding: 16px;
                background: var(--accent-green);
                color: var(--white);
                border: none;
                border-radius: var(--border-radius-md);
                font-weight: 800;
                font-size: 1rem;
                cursor: pointer;
                transition: var(--transition);
              "
            >
              Finalizar Cadastro
            </button>
          </form>

          <p
            style="
              text-align: center;
              margin-top: 25px;
              font-size: 0.95rem;
              color: var(--text-light);
            "
          >
            Já possui conta?
            <a
              href="#"
              id="link-to-login"
              style="color: var(--dark-green); font-weight: 800"
              >Fazer Login</a
            >
          </p>
        </div>
      </section>
    </main>

    <script src="../components.js"></script>
    <script src="../script.js"></script>
    <script>
      // 1. Função de Criptografia (SHA-256)
      async function hashPassword(password) {
        const msgBuffer = new TextEncoder().encode(password);
        const hashBuffer = await crypto.subtle.digest("SHA-256", msgBuffer);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map((b) => b.toString(16).padStart(2, "0")).join("");
      }

      // 2. Alternar entre as telas de Login e Registro
      const viewLogin = document.getElementById("view-login");
      const viewRegister = document.getElementById("view-register");

      document
        .getElementById("link-to-register")
        .addEventListener("click", (e) => {
          e.preventDefault();
          viewLogin.style.display = "none";
          viewRegister.style.display = "block";
        });

      document
        .getElementById("link-to-login")
        .addEventListener("click", (e) => {
          e.preventDefault();
          viewRegister.style.display = "none";
          viewLogin.style.display = "block";
        });

      // 3. Lógica de Submissão de LOGIN
      document
        .getElementById("form-login")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const emailInput = document
            .getElementById("login-email")
            .value.trim();
          const senhaInput = document.getElementById("login-senha").value;
          const errorEl = document.getElementById("error-login");
          const btn = document.getElementById("btn-submit-login");

          // Estado de Loading
          btn.disabled = true;
          btn.textContent = "Autenticando...";
          btn.style.opacity = "0.7";
          errorEl.style.display = "none";

          try {
            const usuarios = await DataService.request({ table: "usuarios" });
            const senhaHash = await hashPassword(senhaInput);

            // Busca o usuário batendo e-mail e a senha criptografada
            const user = usuarios.find(
              (u) =>
                String(u.email || u.Email).toLowerCase() ===
                  emailInput.toLowerCase() &&
                (u.senha === senhaHash || u.Senha === senhaHash)
            );

            if (!user) {
              throw new Error("E-mail ou senha incorretos.");
            }

            // Salva sessão segura (sem a senha)
            const sessionData = {
              id: user.id || user.Id || user.ID,
              nome: user.nome || user.Nome,
              email: user.email || user.Email,
              role: user.role || user.Role,
            };

            sessionStorage.setItem(
              "vozDaTerra_active_user",
              JSON.stringify(sessionData)
            );

            // Redireciona para home
            window.location.href = "../index.html";
          } catch (error) {
            errorEl.textContent = error.message;
            errorEl.style.display = "block";
            btn.disabled = false;
            btn.textContent = "Entrar";
            btn.style.opacity = "1";
          }
        });

      // 4. Lógica de Submissão de REGISTRO
      document
        .getElementById("form-register")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const nome = document.getElementById("reg-nome").value.trim();
          const email = document.getElementById("reg-email").value.trim();
          const role = "user";
          const senha = document.getElementById("reg-senha").value;
          const errorEl = document.getElementById("error-register");
          const btn = document.getElementById("btn-submit-register");

          // Estado de Loading
          btn.disabled = true;
          btn.textContent = "Criando conta...";
          btn.style.opacity = "0.7";
          errorEl.style.display = "none";

          try {
            // Validação: Checa se o e-mail já existe
            const usuarios = await DataService.request({ table: "usuarios" });
            const userExists = usuarios.find(
              (u) =>
                String(u.email || u.Email).toLowerCase() === email.toLowerCase()
            );

            if (userExists) {
              throw new Error("Este e-mail já está cadastrado.");
            }

            const senhaHash = await hashPassword(senha);

            // Criação via POST. Importante: A ordem do array 'values' deve bater exatamente com as colunas da sua planilha (email, nome, role, senha)
            const payload = {
              action: "CREATE",
              table: "usuarios",
              values: [email, nome, role, senhaHash],
            };

            const response = await fetch(API_URL, {
              method: "POST",
              body: JSON.stringify(payload),
            });

            const result = await response.json();

            if (!result.success)
              throw new Error("Falha ao comunicar com o servidor.");

            // Sucesso
            alert("Conta criada com sucesso! Você já pode fazer login.");
            document.getElementById("form-register").reset();
            document.getElementById("link-to-login").click();
          } catch (error) {
            errorEl.textContent = error.message;
            errorEl.style.display = "block";
          } finally {
            btn.disabled = false;
            btn.textContent = "Finalizar Cadastro";
            btn.style.opacity = "1";
          }
        });

      // 5. Proteção de Rota (Se já estiver logado, não tem motivo para ver o login)
      window.addEventListener("load", () => {
        if (sessionStorage.getItem("vozDaTerra_active_user")) {
          window.location.href = "../index.html";
        }
      });
    </script>
  </body>
</html>
