<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voz da Terra - Projetos Ecológicos</title>
  <link rel="icon" type="image/png" href="../logo.png" />
  <link rel="stylesheet" href="../styles.css" />
</head>

<body>
  <div id="sidebar-placeholder"></div>

  <main class="content">
    <section class="feed-container">
      <header class="blog-header">
        <h1>Projetos Ecológicos</h1>
        <p style="color: var(--text-light); margin-top: -10px; margin-bottom: 30px;">
          Conheça as iniciativas que estão fazendo a diferença.
        </p>
      </header>

      <div id="featured-project-container"></div>
      <div id="projects-container" class="projects-grid">
        <p>Sincronizando projetos...</p>
      </div>
    </section>
  </main>

  <template id="tpl-featured-project">
    <article class="article-card featured" style="position: relative">
      <div style="
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            gap: 10px;
            z-index: 10;
          ">
        <button class="author-edit-btn" style="
              display: none;
              background: #f39c12;
              color: white;
              border: none;
              padding: 8px 15px;
              border-radius: 8px;
              font-weight: bold;
              cursor: pointer;
              box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
            ">
          Editar
        </button>
        <button class="admin-delete-btn" style="
              display: none;
              background: #e74c3c;
              color: white;
              border: none;
              padding: 8px 15px;
              border-radius: 8px;
              font-weight: bold;
              cursor: pointer;
              box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
            ">
          Excluir
        </button>
      </div>

      <img src="" class="article-image" alt="Capa do projeto" />
      <div class="article-body">
        <span class="category-tag">Iniciativa</span>
        <h2 class="title" style="font-size: 2rem; margin-bottom: 15px;"></h2>
        <p class="excerpt" style="font-size: 1.1rem; margin-bottom: 25px;"></p>
        <a class="read-more">Ler projeto completo →</a>
      </div>
    </article>
  </template>

  <template id="tpl-project">
    <article class="article-card" style="position: relative">
      <div style="
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 8px;
            z-index: 10;
          ">
        <button class="author-edit-btn"
          style="display: none; background: #f39c12; color: white; border: none; padding: 6px 12px; border-radius: 6px; font-size: 0.8rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.2);">Editar</button>
        <button class="admin-delete-btn"
          style="display: none; background: #e74c3c; color: white; border: none; padding: 6px 12px; border-radius: 6px; font-size: 0.8rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.2);">Excluir</button>
      </div>
      <img src="" class="article-image small" alt="Capa do projeto" />
      <div class="article-body">
        <span class="category-tag">Iniciativa</span>
        <h3 class="title"></h3>
        <p class="excerpt"></p>
        <a class="read-more">Ler projeto completo →</a>
      </div>
    </article>
  </template>

  <script src="../components.js"></script>
  <script src="../script.js"></script>
  <script>
    async function handleProjectDelete(id, cardElement) {
      if (!confirm("Deseja realmente excluir este projeto?")) return;

      const currentUser = JSON.parse(sessionStorage.getItem("vozDaTerra_active_user"));
      cardElement.style.opacity = "0.5";

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          redirect: "follow",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify({
            action: "DELETE",
            table: "projetos",
            id: id,
            userEmail: currentUser.email
          }),
        });

        const result = await response.json();
        if (result.success) {
          cardElement.style.transform = "scale(0.9)";
          cardElement.style.opacity = "0";
          setTimeout(() => cardElement.remove(), 500);
        } else {
          throw new Error(result.error || "Erro ao excluir.");
        }
      } catch (error) {
        alert("Erro: " + error.message);
        cardElement.style.opacity = "1";
      }
    }

    async function loadProjects() {
      const container = document.getElementById("projects-container");
      const featuredContainer = document.getElementById("featured-project-container");
      const template = document.getElementById("tpl-project");
      const tplFeatured = document.getElementById("tpl-featured-project");
      const activeUser = JSON.parse(sessionStorage.getItem("vozDaTerra_active_user"));

      try {
        const projetos = await DataService.request({ table: "projetos" });
        container.innerHTML = "";
        featuredContainer.innerHTML = "";

        if (!projetos || projetos.length === 0) {
          container.innerHTML = "<p>Nenhum projeto encontrado.</p>";
          return;
        }

        const isOdd = projetos.length % 2 !== 0;

        projetos.forEach((projeto, index) => {
          const id = projeto.id || projeto.Id || projeto.ID || projeto.index;
          if (!id && id !== 0) return;

          const useFeatured = isOdd && index === 0;
          const templateTarget = useFeatured ? tplFeatured : template;
          const clone = templateTarget.content.cloneNode(true);
          const cardRoot = clone.querySelector(".article-card");

          const fallbackImg = "https://images.unsplash.com/photo-1542601906990-b4d3fb778b09?auto=format&fit=crop&w=800&q=80";
          clone.querySelector(".article-image").src = projeto.imagem || projeto.url_imagem || fallbackImg;
          clone.querySelector(".title").textContent = projeto.titulo || "Sem título";
          const tagEl = clone.querySelector(".category-tag");
          if (tagEl) {
            tagEl.textContent = projeto.tag || (useFeatured ? "Destaque" : "Iniciativa");
          }

          if (useFeatured) {
            clone.querySelector(".excerpt").textContent = (projeto.conteudo || "").substring(0, 150) + "...";
          } else {
            clone.querySelector(".excerpt").textContent = (projeto.conteudo || "").substring(0, 120) + "...";
          }

          const readMoreBtn = clone.querySelector(".read-more");
          readMoreBtn.addEventListener("click", () => {
            sessionStorage.setItem("vozDaTerra_navigation_origin", "projects");
            sessionStorage.setItem("vozDaTerra_active_content_id", id);
            window.location.href = "artigo.html?type=projetos";
          });
          
          if (activeUser) {
            const emailAutor = projeto.email_autor || projeto.emailAutor || "";
            const isAdmin = activeUser.role === "admin";
            const isOwner = String(activeUser.email).toLowerCase() === String(emailAutor).toLowerCase();

            if (isAdmin || isOwner) {
              const delBtn = clone.querySelector(".admin-delete-btn");
              delBtn.style.display = "block";
              delBtn.addEventListener("click", () => handleProjectDelete(id, cardRoot));

              const editBtn = clone.querySelector(".author-edit-btn");
              editBtn.style.display = "block";
              editBtn.addEventListener("click", () => {
                sessionStorage.setItem("vozDaTerra_active_content_id", id);
                window.location.href = "editar-projeto.html";
              });
            }
          }

          if (useFeatured) {
            featuredContainer.appendChild(clone);
          } else {
            container.appendChild(clone);
          }
        });
      } catch (error) {
        console.error(error);
        container.innerHTML = "<p>Erro ao carregar projetos.</p>";
      }
    }

    window.addEventListener("load", loadProjects);
  </script>
</body>

</html>
