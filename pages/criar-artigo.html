<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voz da Terra - Novo Artigo</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <aside class="sidebar">
      <div class="sidebar-top">
        <div class="logo">
          <img src="../logo.png" alt="logo" />
          <div>VOZ DA<br />TERRA</div>
        </div>
        <button class="hamburger" id="btn-menu">
          <span></span><span></span><span></span>
        </button>
        <nav class="nav-menu" id="nav-menu">
          <ul>
            <li><a href="../index.html">Página Inicial</a></li>
            <li><a href="dados.html">Pesquisa e Dados</a></li>
            <li><a href="projetos.html">Projetos Ecológicos</a></li>
          </ul>
        </nav>
      </div>
    </aside>

    <main class="content">
      <header class="main-header">
        <a href="../index.html" class="back-link">← Voltar para o início</a>
      </header>

      <section class="reading-container">
        <article class="article-card" style="padding: 40px">
          <h1
            style="
              color: var(--dark-green);
              margin-bottom: 25px;
              font-weight: 900;
              font-size: 2rem;
            "
          >
            Escrever Novo Artigo
          </h1>

          <form id="form-criar-artigo">
            <div style="margin-bottom: 20px">
              <label
                style="display: block; margin-bottom: 8px; font-weight: 600"
                >Título do Artigo</label
              >
              <input
                type="text"
                id="art-titulo"
                required
                placeholder="Ex: O impacto do desmatamento na fauna"
                style="
                  width: 100%;
                  padding: 14px;
                  border: 1px solid rgba(0, 0, 0, 0.1);
                  border-radius: var(--border-radius-md);
                  font-family: inherit;
                  font-size: 1rem;
                  outline: none;
                "
              />
            </div>

            <div style="margin-bottom: 20px">
              <label
                style="display: block; margin-bottom: 8px; font-weight: 600"
                >URL da Imagem de Capa</label
              >
              <input
                type="url"
                id="art-imagem"
                required
                placeholder="https://exemplo.com/imagem.jpg"
                style="
                  width: 100%;
                  padding: 14px;
                  border: 1px solid rgba(0, 0, 0, 0.1);
                  border-radius: var(--border-radius-md);
                  font-family: inherit;
                  font-size: 1rem;
                  outline: none;
                "
              />
            </div>

            <div style="margin-bottom: 30px">
              <label
                style="display: block; margin-bottom: 8px; font-weight: 600"
                >Conteúdo</label
              >
              <textarea
                id="art-conteudo"
                required
                placeholder="Escreva seu artigo aqui... (Você pode usar quebras de linha normalmente)"
                style="
                  width: 100%;
                  padding: 14px;
                  border: 1px solid rgba(0, 0, 0, 0.1);
                  border-radius: var(--border-radius-md);
                  font-family: inherit;
                  font-size: 1rem;
                  outline: none;
                  min-height: 300px;
                  resize: vertical;
                "
              ></textarea>
            </div>

            <p
              id="msg-feedback"
              style="
                font-size: 0.9rem;
                font-weight: 600;
                margin-bottom: 15px;
                text-align: center;
                display: none;
              "
            ></p>

            <button
              type="submit"
              id="btn-submit"
              style="
                width: 100%;
                padding: 16px;
                background: var(--dark-green);
                color: var(--white);
                border: none;
                border-radius: var(--border-radius-md);
                font-weight: 800;
                font-size: 1rem;
                cursor: pointer;
                transition: var(--transition);
              "
            >
              Publicar Artigo
            </button>
          </form>
        </article>
      </section>
    </main>

    <script src="../script.js"></script>
    <script>
      // 1. Proteção de Rota: Verifica se está logado
      const activeUser = JSON.parse(
        sessionStorage.getItem("vozDaTerra_active_user")
      );

      if (!activeUser) {
        alert(
          "Acesso negado. Você precisa estar logado para publicar artigos."
        );
        window.location.href = "login.html";
      }

      // 2. Lógica de Submissão
      document
        .getElementById("form-criar-artigo")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const btn = document.getElementById("btn-submit");
          const feedback = document.getElementById("msg-feedback");

          // Coleta dos dados do formulário
          const titulo = document.getElementById("art-titulo").value.trim();
          const imagem = document.getElementById("art-imagem").value.trim();
          const conteudo = document.getElementById("art-conteudo").value.trim();

          // Geração automática da data atual (ex: 25/03/2026)
          const dataAtual = new Date().toLocaleDateString("pt-BR");

          // Estado de Loading
          btn.disabled = true;
          btn.textContent = "Publicando...";
          btn.style.opacity = "0.7";
          feedback.style.display = "none";

          try {
            // A ORDEM AQUI É CRÍTICA! Deve bater com a planilha após a coluna ID:
            // [titulo, conteudo, autor, email_autor, data, imagem]
            const payload = {
              action: "CREATE",
              table: "artigos",
              values: [
                titulo,
                conteudo,
                activeUser.nome, // Puxa do usuário logado
                activeUser.email, // Puxa do usuário logado
                dataAtual, // Gerado pelo JS
                imagem,
              ],
            };

            const response = await fetch(API_URL, {
              method: "POST",
              redirect: "follow",
              headers: {
                "Content-Type": "text/plain;charset=utf-8",
              },
              body: JSON.stringify(payload),
            });

            if (!response.ok) throw new Error("Falha na rede HTTP");

            const result = await response.json();

            if (result.success) {
              feedback.textContent =
                "Artigo publicado com sucesso! Redirecionando...";
              feedback.style.color = "var(--accent-green)";
              feedback.style.display = "block";

              // Aguarda 2 segundos para o usuário ler a mensagem e manda para a Home
              setTimeout(() => {
                window.location.href = "../index.html";
              }, 2000);
            } else {
              throw new Error(result.error || "Erro desconhecido ao salvar.");
            }
          } catch (error) {
            console.error("Erro ao criar artigo:", error);
            feedback.textContent = error.message;
            feedback.style.color = "#e74c3c"; // Vermelho erro
            feedback.style.display = "block";

            // Restaura o botão
            btn.disabled = false;
            btn.textContent = "Publicar Artigo";
            btn.style.opacity = "1";
          }
        });
    </script>
  </body>
</html>
