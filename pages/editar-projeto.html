<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voz da Terra - Editar Projeto</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <div id="sidebar-placeholder"></div>

    <main class="content">
      <header class="main-header">
        <a href="projetos.html" class="back-link">← Voltar para Projetos</a>
      </header>

      <section class="reading-container" id="loader-container">
        <p>Buscando dados do projeto...</p>
      </section>

      <section class="reading-container" id="form-container" style="display: none">
        <article class="article-card" style="padding: 40px">
          <h1 style="color: var(--dark-green); margin-bottom: 25px; font-weight: 900; font-size: 2rem;">Editar Projeto</h1>

          <form id="form-editar-projeto">
            <div style="margin-bottom: 20px">
              <label style="display: block; margin-bottom: 8px; font-weight: 600">Título do Projeto</label>
              <input
                type="text"
                id="proj-titulo"
                required
                style="
                  width: 100%;
                  padding: 14px;
                  border: 1px solid rgba(0, 0, 0, 0.1);
                  border-radius: var(--border-radius-md);
                  font-family: inherit;
                  font-size: 1rem;
                  outline: none;
                "
              />
            </div>

            <div style="margin-bottom: 20px">
              <label style="display: block; margin-bottom: 8px; font-weight: 600">URL da Imagem</label>
              <input
                type="url"
                id="proj-imagem"
                required
                style="
                  width: 100%;
                  padding: 14px;
                  border: 1px solid rgba(0, 0, 0, 0.1);
                  border-radius: var(--border-radius-md);
                  font-family: inherit;
                  font-size: 1rem;
                  outline: none;
                "
              />
            </div>

            <div style="margin-bottom: 30px">
              <label style="display: block; margin-bottom: 8px; font-weight: 600">Descrição do Projeto</label>
              <textarea
                id="proj-conteudo"
                required
                style="
                  width: 100%;
                  padding: 14px;
                  border: 1px solid rgba(0, 0, 0, 0.1);
                  border-radius: var(--border-radius-md);
                  font-family: inherit;
                  font-size: 1rem;
                  outline: none;
                  min-height: 300px;
                  resize: vertical;
                "
              ></textarea>
            </div>

            <p id="msg-feedback" style="font-size: 0.9rem; font-weight: 600; margin-bottom: 15px; text-align: center; display: none;"></p>

            <button
              type="submit"
              id="btn-submit"
              style="
                width: 100%;
                padding: 16px;
                background: #f39c12;
                color: var(--white);
                border: none;
                border-radius: var(--border-radius-md);
                font-weight: 800;
                font-size: 1rem;
                cursor: pointer;
                transition: var(--transition);
              "
            >
              Salvar Alterações
            </button>
          </form>
        </article>
      </section>
    </main>

    <script src="../components.js"></script>
    <script src="../script.js"></script>
    <script>
      const activeUser = JSON.parse(sessionStorage.getItem("vozDaTerra_active_user"));
      const editId = sessionStorage.getItem("vozDaTerra_editArticleId");

      let dataOriginal = "";
      let autorOriginal = "";
      let emailOriginal = "";

      if (!activeUser || !editId) window.location.href = "projetos.html";

      window.addEventListener("load", async () => {
        try {
          const projetos = await DataService.request({ table: "projetos" });
          const projeto = projetos.find(p => String(p.id || p.ID || p.Id) === String(editId));

          if (!projeto) throw new Error("Projeto não encontrado.");

          document.getElementById("proj-titulo").value = projeto.titulo || "";
          document.getElementById("proj-imagem").value = projeto.imagem || projeto.url_imagem || "";
          document.getElementById("proj-conteudo").value = projeto.conteudo || "";

          dataOriginal = projeto.data || new Date().toLocaleDateString("pt-BR");
          autorOriginal = projeto.autor || "";
          emailOriginal = projeto.email_autor || projeto.emailAutor || "";

          document.getElementById("loader-container").style.display = "none";
          document.getElementById("form-container").style.display = "block";
        } catch (error) {
          document.getElementById("loader-container").innerHTML = `<h2>Erro: ${error.message}</h2><a href="projetos.html">Voltar</a>`;
        }
      });

      document.getElementById("form-editar-projeto").addEventListener("submit", async (e) => {
        e.preventDefault();

        const btn = document.getElementById("btn-submit");
        const feedback = document.getElementById("msg-feedback");

        const titulo = document.getElementById("proj-titulo").value.trim();
        const imagem = document.getElementById("proj-imagem").value.trim();
        const conteudo = document.getElementById("proj-conteudo").value.trim();

        btn.disabled = true;
        btn.textContent = "Salvando...";
        feedback.style.display = "none";

        try {
          const payload = {
            action: "UPDATE",
            table: "projetos",
            id: editId,
            userEmail: activeUser.email,
            values: [titulo, conteudo, autorOriginal, emailOriginal, dataOriginal, imagem],
          };

          const response = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify(payload),
          });

          const result = await response.json();

          if (result.success) {
            feedback.textContent = "Projeto atualizado com sucesso!";
            feedback.style.color = "var(--accent-green)";
            feedback.style.display = "block";
            setTimeout(() => { window.location.href = "projetos.html"; }, 1500);
          } else {
            throw new Error(result.error || "Erro ao salvar.");
          }
        } catch (error) {
          feedback.textContent = error.message;
          feedback.style.color = "#e74c3c";
          feedback.style.display = "block";
          btn.disabled = false;
          btn.textContent = "Salvar Alterações";
        }
      });
    </script>
  </body>
</html>
