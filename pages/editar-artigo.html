<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voz da Terra - Editar Artigo</title>
  <link rel="icon" type="image/png" href="../logo.png" />
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <div id="sidebar-placeholder"></div>

    <main class="content">
      <header class="main-header">
        <a href="../index.html" class="back-link">← Voltar para o início</a>
      </header>

      <section class="reading-container" id="loader-container">
        <p>Buscando dados do artigo...</p>
      </section>

      <section
        class="reading-container"
        id="form-container"
        style="display: none"
      >
        <article class="article-card" style="padding: 40px">
          <h1
            style="
              color: var(--dark-green);
              margin-bottom: 25px;
              font-weight: 900;
              font-size: 2rem;
            "
          >
            Editar Artigo
          </h1>

          <form id="form-editar-artigo">
            <div style="margin-bottom: 20px">
              <label
                style="display: block; margin-bottom: 8px; font-weight: 600"
                >Título do Artigo</label
              >
              <input
                type="text"
                id="edit-titulo"
                required
                style="
                  width: 100%;
                  padding: 14px;
                  border: 1px solid rgba(0, 0, 0, 0.1);
                  border-radius: var(--border-radius-md);
                  font-family: inherit;
                  font-size: 1rem;
                  outline: none;
                "
              />
            </div>

            <div style="margin-bottom: 20px">
              <label
                style="display: block; margin-bottom: 8px; font-weight: 600"
                >URL da Imagem de Capa</label
              >
              <input
                type="url"
                id="edit-imagem"
                required
                style="
                  width: 100%;
                  padding: 14px;
                  border: 1px solid rgba(0, 0, 0, 0.1);
                  border-radius: var(--border-radius-md);
                  font-family: inherit;
                  font-size: 1rem;
                  outline: none;
                "
              />
            </div>

            <div style="margin-bottom: 20px">
              <label
                style="display: block; margin-bottom: 8px; font-weight: 600"
                >Categoria (Tag)</label
              >
              <select
                id="art-tag"
                required
                style="
                  width: 100%;
                  padding: 14px;
                  border: 1px solid rgba(0, 0, 0, 0.1);
                  border-radius: var(--border-radius-md);
                  font-family: inherit;
                  font-size: 1rem;
                  outline: none;
                  background: white;
                "
              >
                <option value="Ecossistema">Ecossistema</option>
                <option value="Mudança Climática">Mudança Climática</option>
                <option value="Biodiversidade">Biodiversidade</option>
                <option value="Opinião">Opinião</option>
                <option value="Entrevista">Entrevista</option>
                <option value="Ciência">Ciência</option>
                <option value="Política">Política</option>
              </select>
            </div>

            <div style="margin-bottom: 30px">
              <label
                style="display: block; margin-bottom: 8px; font-weight: 600"
                >Conteúdo</label
              >
              <textarea
                id="edit-conteudo"
                required
                style="
                  width: 100%;
                  padding: 14px;
                  border: 1px solid rgba(0, 0, 0, 0.1);
                  border-radius: var(--border-radius-md);
                  font-family: inherit;
                  font-size: 1rem;
                  outline: none;
                  min-height: 300px;
                  resize: vertical;
                "
              ></textarea>
            </div>

            <p
              id="msg-feedback"
              style="
                font-size: 0.9rem;
                font-weight: 600;
                margin-bottom: 15px;
                text-align: center;
                display: none;
              "
            ></p>

            <button
              type="submit"
              id="btn-submit"
              style="
                width: 100%;
                padding: 16px;
                background: #f39c12;
                color: var(--white);
                border: none;
                border-radius: var(--border-radius-md);
                font-weight: 800;
                font-size: 1rem;
                cursor: pointer;
                transition: var(--transition);
              "
            >
              Salvar Alterações
            </button>
          </form>
        </article>
      </section>
    </main>

    <script src="../components.js"></script>
    <script src="../script.js"></script>
    <script>
      const urlParams = new URLSearchParams(window.location.search);
      const isProject = urlParams.get("type") === "projetos";
      const table = isProject ? "projetos" : "artigos";

      if (isProject) {
        document.title = "Voz da Terra - Editar Projeto";
        document.querySelector("h1").textContent = "Editar Projeto";
      }

      const activeUser = JSON.parse(
        sessionStorage.getItem("vozDaTerra_active_user")
      );
      const editArticleId = sessionStorage.getItem("vozDaTerra_active_content_id");

      // Controle de Dados Originais que não devem ser alterados pelo form
      let dataOriginal = "";
      let autorOriginal = "";
      let emailOriginal = "";

      if (!activeUser || !editArticleId) {
        window.location.href = "../index.html";
      }

      // 1. Carrega os dados atuais do artigo
      window.addEventListener("load", async () => {
        try {
          const artigos = await DataService.request({ table: table });
          const artigo = artigos.find(a => {
            const currentId = String(a.id || a.Id || a.ID || a.index || "").trim();
            const targetId = String(editArticleId || "").trim();
            return currentId === targetId && targetId !== "";
          });

          if (!artigo) throw new Error("Artigo não encontrado.");

          // Validação de segurança no Front
          const emailAutor =
            artigo.email_autor || artigo.emailAutor || artigo.Email_autor || "";
          if (
            activeUser.role !== "admin" &&
            String(activeUser.email).toLowerCase() !==
              String(emailAutor).toLowerCase()
          ) {
            throw new Error("Você não tem permissão para editar este artigo.");
          }

          // Preenche os inputs
          document.getElementById("edit-titulo").value =
            artigo.titulo || artigo.Título || "";
          document.getElementById("edit-imagem").value =
            artigo.imagem || artigo.url_imagem || artigo.Imagem || "";
          document.getElementById("edit-conteudo").value =
            artigo.conteudo || artigo.Conteúdo || "";
          document.getElementById("art-tag").value = artigo.tag || "Ecossistema";

          // Preserva os dados originais de autoria para injetar no payload depois
          dataOriginal =
            artigo.data ||
            artigo.Data ||
            new Date().toLocaleDateString("pt-BR");
          autorOriginal = artigo.autor || artigo.Autor;
          emailOriginal = emailAutor;

          document.getElementById("loader-container").style.display = "none";
          document.getElementById("form-container").style.display = "block";
        } catch (error) {
          document.getElementById(
            "loader-container"
          ).innerHTML = `<h2>Erro: ${error.message}</h2><a href="../index.html">Voltar</a>`;
        }
      });

      // 2. Envia a Atualização
      document
        .getElementById("form-editar-artigo")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const btn = document.getElementById("btn-submit");
          const feedback = document.getElementById("msg-feedback");

          const titulo = document.getElementById("edit-titulo").value.trim();
          const imagem = document.getElementById("edit-imagem").value.trim();
          const conteudo = document
            .getElementById("edit-conteudo")
            .value.trim();
          const tag = document.getElementById("art-tag").value;

          btn.disabled = true;
          btn.textContent = "Salvando...";
          btn.style.opacity = "0.7";
          feedback.style.display = "none";

          try {
            // A ordem deve ser idêntica à do CREATE: [titulo, conteudo, autor, email, data, imagem]
            const payload = {
              action: "UPDATE",
              table: table,
              id: editArticleId,
              userEmail: activeUser.email,
              values: [
                titulo,
                conteudo,
                autorOriginal,
                emailOriginal,
                dataOriginal,
                imagem,
                tag
              ],
            };

            const response = await fetch(API_URL, {
              method: "POST",
              redirect: "follow",
              headers: { "Content-Type": "text/plain;charset=utf-8" },
              body: JSON.stringify(payload),
            });

            if (!response.ok) throw new Error("Falha na rede HTTP");

            const result = await response.json();

            if (result.success) {
              feedback.textContent = "Artigo atualizado com sucesso!";
              feedback.style.color = "var(--accent-green)";
              feedback.style.display = "block";

              setTimeout(() => {
                window.location.href = isProject ? "projetos.html" : "../index.html";
              }, 1500);
            } else {
              throw new Error(result.error || "Erro ao salvar no banco.");
            }
          } catch (error) {
            feedback.textContent = error.message;
            feedback.style.color = "#e74c3c";
            feedback.style.display = "block";
            btn.disabled = false;
            btn.textContent = "Salvar Alterações";
            btn.style.opacity = "1";
          }
        });
    </script>
  </body>
</html>
